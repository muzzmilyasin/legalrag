<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal RAG Assistant</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0d0d0d;
            color: #e2e8f0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: #111827;
            border-right: 1px solid #1f2937;
            display: flex;
            flex-direction: column;
            padding: 24px 20px;
            gap: 20px;
        }

        .sidebar h1 {
            font-size: 1.3rem;
            color: #a78bfa;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar p.subtitle {
            font-size: 0.8rem;
            color: #6b7280;
            line-height: 1.5;
        }

        .divider { border: none; border-top: 1px solid #1f2937; }

        /* Upload area */
        .upload-zone {
            border: 2px dashed #374151;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .upload-zone:hover { border-color: #7c3aed; }
        .upload-zone input { display: none; }
        .upload-zone .icon { font-size: 2rem; margin-bottom: 8px; }
        .upload-zone p { font-size: 0.8rem; color: #9ca3af; }
        .upload-zone .filename { color: #a78bfa; font-size: 0.85rem; margin-top: 6px; }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.85; }

        .btn-primary { background: #7c3aed; color: white; }
        .btn-secondary { background: #1f2937; color: #9ca3af; }

        .status {
            font-size: 0.8rem;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .status.success { background: #064e3b; color: #6ee7b7; display: block; }
        .status.error   { background: #450a0a; color: #fca5a5; display: block; }
        .status.loading { background: #1e1b4b; color: #a5b4fc; display: block; }

        /* Main chat */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 20px 24px;
            border-bottom: 1px solid #1f2937;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header h2 { font-size: 1rem; color: #d1d5db; }
        .chat-header span { font-size: 0.75rem; color: #6b7280; }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 0.9rem;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

        .message.user {
            background: #7c3aed;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            background: #1f2937;
            color: #e2e8f0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message.assistant p { margin-bottom: 10px; }
        .message.assistant p:last-child { margin-bottom: 0; }
        .message.assistant ul, .message.assistant ol { margin-left: 24px; margin-bottom: 10px; }
        .message.assistant li { margin-bottom: 4px; }
        .message.assistant strong { color: #f9fafb; font-weight: 600; }
        .message.thinking {
            background: #111827;
            color: #6b7280;
            font-style: italic;
            align-self: flex-start;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #374151;
        }
        .empty-state .icon { font-size: 3rem; }
        .empty-state p { font-size: 0.9rem; }

        /* Input bar */
        .chat-input-bar {
            padding: 16px 24px;
            border-top: 1px solid #1f2937;
            display: flex;
            gap: 10px;
        }

        .chat-input-bar input {
            flex: 1;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 10px 14px;
            color: #e2e8f0;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .chat-input-bar input:focus { border-color: #7c3aed; }
        .chat-input-bar input::placeholder { color: #4b5563; }

        .chat-input-bar button {
            width: auto;
            padding: 10px 20px;
            background: #7c3aed;
            color: white;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div>
        <h1>⚖️ Legal RAG</h1>
        <p class="subtitle">Upload a legal contract and ask questions about it.</p>
    </div>
    <hr class="divider">

    <label class="upload-zone" for="pdfInput">
        <div class="icon">📄</div>
        <p>Click to upload a PDF</p>
        <div class="filename" id="fileName">No file selected</div>
        <input type="file" id="pdfInput" accept=".pdf">
    </label>

    <button class="btn-primary" onclick="uploadPDF()">Process PDF</button>
    <div class="status" id="uploadStatus"></div>

    <hr class="divider">
    <button class="btn-secondary" onclick="resetChat()">Clear Chat</button>
</div>

<!-- Main -->
<div class="main">
    <div class="chat-header">
        <h2>Legal Contract Assistant</h2>
        <span id="docName">No document loaded</span>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="empty-state" id="emptyState">
            <div class="icon">⚖️</div>
            <p>Upload a PDF contract to get started</p>
        </div>
    </div>

    <div class="chat-input-bar">
        <input type="text" id="questionInput" placeholder="Ask a question about the contract..." onkeydown="if(event.key==='Enter') sendQuestion()">
        <button onclick="sendQuestion()">Send</button>
    </div>
</div>

<script>
    let docLoaded = false;

    // File picker label update
    document.getElementById('pdfInput').addEventListener('change', function() {
        const name = this.files[0]?.name || 'No file selected';
        document.getElementById('fileName').textContent = name;
    });

    function setStatus(msg, type) {
        const el = document.getElementById('uploadStatus');
        el.textContent = msg;
        el.className = `status ${type}`;
    }

    async function uploadPDF() {
        const file = document.getElementById('pdfInput').files[0];
        if (!file) { setStatus('Please select a PDF file.', 'error'); return; }

        setStatus('Processing PDF... this may take a moment.', 'loading');

        const form = new FormData();
        form.append('pdf', file);

        try {
            const res = await fetch('/upload', { method: 'POST', body: form });
            const data = await res.json();
            if (res.ok) {
                setStatus(data.message, 'success');
                docLoaded = true;
                document.getElementById('docName').textContent = file.name;
                clearChat();
            } else {
                setStatus(data.error || 'Upload failed', 'error');
            }
        } catch (e) {
            setStatus('Server error. Is the backend running?', 'error');
        }
    }

    function addMessage(text, role) {
        const container = document.getElementById('chatMessages');
        document.getElementById('emptyState')?.remove();

        const div = document.createElement('div');
        div.className = `message ${role}`;
        if (role === 'assistant') {
            div.innerHTML = marked.parse(text);
        } else {
            div.textContent = text;
        }
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        return div;
    }

    async function sendQuestion() {
        const input = document.getElementById('questionInput');
        const query = input.value.trim();
        if (!query) return;
        if (!docLoaded) { addMessage('Please upload and process a PDF first.', 'assistant'); return; }

        input.value = '';
        addMessage(query, 'user');
        const thinking = addMessage('Analyzing contract...', 'thinking');

        try {
            const res = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query })
            });
            const data = await res.json();
            thinking.remove();
            addMessage(data.answer || data.error, 'assistant');
        } catch (e) {
            thinking.remove();
            addMessage('Error connecting to server.', 'assistant');
        }
    }

    function clearChat() {
        fetch('/reset', { method: 'POST' });
        const container = document.getElementById('chatMessages');
        container.innerHTML = '<div class="empty-state" id="emptyState"><div class="icon">⚖️</div><p>Document loaded — ask your questions!</p></div>';
    }

    async function resetChat() {
        await fetch('/reset', { method: 'POST' });
        clearChat();
    }
</script>
</body>
</html>
